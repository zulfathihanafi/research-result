apiVersion: v1
kind: Pod
metadata:
  name: fusion-workload-1
  labels:
    app: fusion-workload
    workload-type: fusion
    run-id: "20260510_152452"
    scheduler: "drs-scheduler"
spec:
  schedulerName: drs-scheduler
  restartPolicy: Never
  containers:
  - name: fusion-app
    image: fathiimran/workload-fusion:1.2
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "253m"
        memory: "512Mi"
      limits:
        cpu: "253m"
        memory: "512Mi"
    envFrom:
    - configMapRef:
        name: db-workload-config
