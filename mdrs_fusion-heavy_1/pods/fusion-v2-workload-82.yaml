apiVersion: v1
kind: Pod
metadata:
  name: fusion-v2-workload-82
  labels:
    app: fusion-v2-workload
    workload-type: fusion-v2
    run-id: "mdrs_fusion-heavy_1"
    scheduler: "dqn-scheduler"
spec:
  schedulerName: dqn-scheduler
  restartPolicy: Never
  containers:
  - name: fusion-v2-app
    image: fathiimran/workload-fusion-v2:1.2
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "335m"
        memory: "512Mi"
      limits:
        cpu: "335m"
        memory: "512Mi"
    envFrom:
    - configMapRef:
        name: db-workload-config
