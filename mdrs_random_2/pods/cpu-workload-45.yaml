apiVersion: v1
kind: Pod
metadata:
  name: cpu-workload-45
  labels:
    app: cpu-workload
    workload-type: cpu
    run-id: "mdrs_random_2"
    scheduler: "dqn-scheduler"
spec:
  schedulerName: dqn-scheduler
  restartPolicy: Never
  containers:
  - name: cpu-app
    image: fathiimran/workload-cpu:1.2
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "336m"
        memory: "512Mi"
      limits:
        cpu: "336m"
        memory: "512Mi"
    envFrom:
    - configMapRef:
        name: db-workload-config
