apiVersion: v1
kind: Pod
metadata:
  name: fusion-workload-21
  labels:
    app: fusion-workload
    workload-type: fusion
    run-id: "20260510_172638"
    scheduler: "dqn-scheduler"
spec:
  schedulerName: dqn-scheduler
  restartPolicy: Never
  containers:
  - name: fusion-app
    image: fathiimran/workload-fusion:1.2
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "379m"
        memory: "512Mi"
      limits:
        cpu: "379m"
        memory: "512Mi"
    envFrom:
    - configMapRef:
        name: db-workload-config
