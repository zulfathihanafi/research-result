apiVersion: v1
kind: Pod
metadata:
  name: mongo-workload-20
  labels:
    app: mongo-workload
    workload-type: mongo
    run-id: "mdrs_fusion-heavy_2"
    scheduler: "dqn-scheduler"
spec:
  schedulerName: dqn-scheduler
  restartPolicy: Never
  containers:
  - name: mongo-app
    image: fathiimran/workload-mongo:1.2
    imagePullPolicy: IfNotPresent
    resources:
      requests:
        cpu: "238m"
        memory: "512Mi"
      limits:
        cpu: "238m"
        memory: "512Mi"
    envFrom:
    - configMapRef:
        name: db-workload-config
